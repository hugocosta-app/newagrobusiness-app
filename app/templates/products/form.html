{% extends "base.html" %}

{% block title %}{{ "Adicionar Produto" if not product else "Editar Produto" }}{% endblock %}

{% block content %}
<div class="product-form-container">
    <h2>{{ "Adicionar Produto" if not product else "Editar Produto" }}</h2>
    <form method="POST" action="{{ url_for("products.add_product") if not product else url_for("products.edit_product", product_id=product.id) }}">
        <div class="form-group">
            <label for="name">Nome do Produto:</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
        </div>
        <div class="form-group">
            <label for="price">Preço (R$):</label>
            <input type="number" id="price" name="price" class="form-control" step="0.01" value="{{ product.price if product else '' }}" required>
        </div>
        <div class="form-group">
            <label for="stock">Estoque:</label>
            <input type="number" id="stock" name="stock" class="form-control" value="{{ product.stock if product else '' }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar Produto</button>
        <a href="{{ url_for("products.list_products") }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
