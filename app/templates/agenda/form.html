{% extends "base.html" %}

{% block title %}{{ title }} - New Agrobusiness{% endblock %}

{% block content %}
<div class="agenda-form-container">
    <h2>{{ title }}</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label for="entry_date">Data:</label>
            <input type="date" id="entry_date" name="entry_date" class="form-control" required 
                   value="{{ entry.entry_date.strftime(\"%Y-%m-%d\") if entry else prefill_date }}">
        </div>
        <div class="form-group">
            <label for="location">Localização:</label>
            <input type="text" id="location" name="location" class="form-control" required 
                   placeholder="Ex: Cidade X, Cliente Y" value="{{ entry.location if entry else \"\" }}">
        </div>
        <div class="form-group">
            <label for="description">Descrição (Opcional):</label>
            <textarea id="description" name="description" class="form-control" rows="3" 
                      placeholder="Ex: Reunião de prospecção, Visita de acompanhamento">{{ entry.description if entry else \"\" }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">{{ \"Atualizar Compromisso\" if entry else \"Adicionar Compromisso\" }}</button>
        <a href="{{ url_for('agenda.view_agenda', date=(entry.entry_date.strftime(\"%Y-%m-%d\") if entry else prefill_date)) }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
