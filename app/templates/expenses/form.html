{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="expense-form-container">
    <h2>{{ title }}</h2>
    <form method="POST" action="{{ action_url }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="date">Data da Despesa:</label>
            <input type="date" id="date" name="date" class="form-control" value="{{ expense.date.strftime('%Y-%m-%d') if expense else '' }}" required>
        </div>
        <div class="form-group">
            <label for="category">Categoria:</label>
            <select id="category" name="category" class="form-control" required>
                <option value="">Selecione uma categoria</option>
                <option value="combustivel" {% if expense and expense.category == 'combustivel' %}selected{% endif %}>Combustível</option>
                <option value="pedagio" {% if expense and expense.category == 'pedagio' %}selected{% endif %}>Pedágio</option>
                <option value="refeicao" {% if expense and expense.category == 'refeicao' %}selected{% endif %}>Refeição</option>
                <option value="hotel" {% if expense and expense.category == 'hotel' %}selected{% endif %}>Hotel</option>
                <option value="diversos" {% if expense and expense.category == 'diversos' %}selected{% endif %}>Diversos</option>
            </select>
        </div>
        <div class="form-group">
            <label for="amount">Valor (R$):</label>
            <input type="number" id="amount" name="amount" class="form-control" step="0.01" value="{{ expense.amount if expense else '' }}" required>
        </div>
        <div class="form-group">
            <label for="description">Descrição:</label>
            <textarea id="description" name="description" class="form-control" rows="3">{{ expense.description if expense else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="city">Cidade:</label>
            <input type="text" id="city" name="city" class="form-control" value="{{ expense.city if expense else '' }}" required>
        </div>
        <div class="form-group">
            <label for="state">Estado (UF):</label>
            <input type="text" id="state" name="state" class="form-control" maxlength="2" value="{{ expense.state if expense else '' }}" required>
        </div>
        <div class="form-group">
            <label for="initial_km">KM Inicial:</label>
            <input type="number" id="initial_km" name="initial_km" class="form-control" value="{{ expense.initial_km if expense else '' }}">
        </div>
        <div class="form-group">
            <label for="final_km">KM Final:</label>
            <input type="number" id="final_km" name="final_km" class="form-control" value="{{ expense.final_km if expense else '' }}">
        </div>
        <div class="form-group">
            <label for="receipt_photo">Foto da Nota Fiscal:</label>
            <input type="file" id="receipt_photo" name="receipt_photo" class="form-control-file" accept="image/*">
            {% if expense and expense.receipt_photo_url %}
                <p>Nota fiscal atual: <a href="{{ expense.receipt_photo_url }}" target="_blank">Ver Nota Fiscal</a></p>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary">Salvar Despesa</button>
        <a href="{{ url_for("expenses.list_expenses") }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
